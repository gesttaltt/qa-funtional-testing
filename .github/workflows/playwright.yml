name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Check formatting
        run: npm run format:check
      - name: Typecheck
        run: npm run typecheck
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

  deploy-report:
    needs: test
    if: ${{ !cancelled() && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    concurrency:
      group: 'pages'
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: allure-results
          path: allure-results
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Allure CLI
        run: npm install -g allure-commandline
      - name: Fetch previous report history for trend graphs
        run: |
          mkdir -p allure-results/history
          for f in history.json history-trend.json categories-trend.json duration-trend.json retry-trend.json; do
            curl -sf "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/history/$f" \
              -o "allure-results/history/$f" || rm -f "allure-results/history/$f"
          done
      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report
      - uses: actions/upload-pages-artifact@v5
        with:
          path: allure-report
      - uses: actions/deploy-pages@v5
        id: deployment
