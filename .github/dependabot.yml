version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        patterns:
          - '*'
    ignore:
      # typescript-eslint pins a narrower typescript peer range than typescript itself
      # releases at; a grouped major bump breaks `npm ci` with ERESOLVE before bumping
      # typescript-eslint too. Bump both together by hand instead.
      - dependency-name: 'typescript'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
